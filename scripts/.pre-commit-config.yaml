# Pre-commit hooks for azext-prototype
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files
# See https://pre-commit.com for more information.
#
# NOTE: This file lives in scripts/ — if using the pre-commit framework,
# either symlink or copy it to the repo root:
#   ln -s scripts/.pre-commit-config.yaml .pre-commit-config.yaml

repos:
  - repo: local
    hooks:
      - id: validate-governance
        name: Validate governance (policies, anti-patterns, standards)
        entry: python -m azext_prototype.governance.validate --all --strict
        language: python
        types: [yaml]
        files: '(\.policy\.yaml|anti_patterns/.*\.yaml|standards/.*\.yaml)$'
        pass_filenames: false

      - id: validate-templates
        name: Validate workload template compliance
        entry: python -m azext_prototype.templates.validate --hook --strict
        language: python
        types: [yaml]
        files: '\.template\.yaml$'
        pass_filenames: false
