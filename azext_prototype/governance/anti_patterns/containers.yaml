# Anti-pattern detection — Containers domain
#
# Detects insecure container and registry configurations in
# AI-generated output.

domain: containers
description: Container Apps, ACR, and container runtime configuration detection

patterns:
  - id: ANTI-CONT-001
    search_patterns:
      - "environment_variable"
      - "env_var"
    safe_patterns:
      - "key vault"
      - "keyvault"
      - "managed identity"
      - "secret_ref"
      - "secretref"
    correct_patterns:
      - "secret_ref"
      - "secretRef"
      - "# Use Key Vault references with managed identity"
      - 'keyVaultUrl'
    warning_message: "Secrets in environment variables detected — use Key Vault references with managed identity instead."

  - id: ANTI-CONT-002
    search_patterns:
      - "admin_user_enabled = true"
      - "acrpush"
    safe_patterns:
      - "managed identity"
      - "acrpull"
    correct_patterns:
      - "admin_user_enabled = false"
      - 'adminUserEnabled = false'
      - '"AcrPull"'
      - "# Use managed identity with AcrPull role assignment"
    warning_message: "Container registry admin credentials detected — use managed identity with AcrPull role assignment."

  - id: ANTI-CONT-003
    search_patterns:
      - "microsoft.app/containerapps"
    safe_patterns:
      - "userassignedidentities"
      - "systemassigned, userassigned"
    correct_patterns:
      - 'type = "SystemAssigned, UserAssigned"'
      - "identity.userAssignedIdentities"
    warning_message: >-
      Container App detected. Ensure the identity block uses UserAssigned (or
      SystemAssigned, UserAssigned) with the UAMI attached in
      userAssignedIdentities for ACR image pull. SystemAssigned alone causes
      image pull failures on first provision.
