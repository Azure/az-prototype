# Anti-pattern detection — Networking domain
#
# Detects overly permissive network configurations, missing private
# endpoints, and public exposure in AI-generated output.

domain: networking
description: Network isolation, firewall rules, and public exposure detection

patterns:
  - id: ANTI-NET-001
    search_patterns:
      - "public_network_access_enabled = true"
      - 'public_network_access = "enabled"'
      - 'publicnetworkaccess = "enabled"'
      - 'publicnetworkaccessforingestion = "enabled"'
      - 'publicnetworkaccessforquery = "enabled"'
    safe_patterns:
      - "public_network_access_enabled = false"
      - 'publicnetworkaccess = "disabled"'
      - 'publicnetworkaccessforingestion = "disabled"'
      - 'publicnetworkaccessforquery = "disabled"'
      - "public_network_access_enabled = var."
    correct_patterns:
      - 'publicNetworkAccess = "Disabled"'
      - "public_network_access_enabled = false"
      - 'publicNetworkAccessForIngestion = "Disabled"'
      - 'publicNetworkAccessForQuery = "Disabled"'
    warning_message: "Public network access is enabled — disable public access and use private endpoints or service endpoints. This applies to ALL environments including POC."

  - id: ANTI-NET-002
    search_patterns:
      - "0.0.0.0/0"
      - "0.0.0.0-255.255.255.255"
    safe_patterns:
      - "do not allow 0.0.0.0"
      - "avoid 0.0.0.0"
    warning_message: "Overly permissive network rule detected (0.0.0.0/0) — use specific IP ranges or service tags."

  - id: ANTI-NET-003
    search_patterns:
      - "ingress_type = \"external\""
      - "external_enabled = true"
    safe_patterns:
      - "apim"
      - "api management"
      - "front door"
      - "application gateway"
    warning_message: "Direct external ingress detected — consider using API Management or Front Door as a gateway."

  - id: ANTI-NET-004
    search_patterns:
      - "vnet_route_all_enabled = false"
      - "virtual_network_subnet_id = null"
    safe_patterns: []
    warning_message: "VNET integration disabled — enable VNET integration for backend connectivity to private resources."

  - id: ANTI-NET-005
    search_patterns:
      - "ip_restriction = []"
      - "scm_ip_restriction = []"
    safe_patterns:
      - "ip_restriction = var."
    warning_message: "Empty IP restrictions — configure IP restrictions or use VNET integration to limit access."

  - id: ANTI-NET-006
    search_patterns:
      - "privateLinkServiceId = azapi_resource.vnet"
      - "privateLinkServiceId = azapi_resource.virtual_network"
      - "private_link_service_id = azurerm_virtual_network"
    safe_patterns: []
    correct_patterns:
      - "# Do NOT create placeholder private endpoints"
      - "# Private endpoints belong in service stages, not the networking stage"
    warning_message: >-
      Private endpoint references a VNet as its privateLinkServiceId — VNets
      are not valid Private Link targets. ARM will reject this with HTTP 400.
      Do NOT create placeholder private endpoints in the networking stage.
      Private endpoints belong in their respective service stages.

  - id: ANTI-NET-007
    search_patterns:
      - "diag_vnet"
      - "diag_nsg"
      - "diagnostics_vnet"
      - "diagnostics_nsg"
    safe_patterns:
      - 'category = "AllMetrics"'
    correct_patterns:
      - 'category = "AllMetrics"'
      - "# VNets and NSGs only support AllMetrics, not log categories"
    warning_message: >-
      VNet or NSG diagnostic settings detected. These resources only support
      AllMetrics for diagnostics, not log categories. Using categoryGroup =
      "allLogs" on VNet/NSG causes ARM HTTP 400. Use category = "AllMetrics" only.

  - id: ANTI-NET-008
    search_patterns:
      - "nsg_pe_diag"
      - "nsg_aca_diag"
      - "nsg_diag"
      - "diagnosticsettings\" {\n"
    safe_patterns:
      - "# NSGs do not support diagnostic settings"
    correct_patterns:
      - "# NSGs do NOT support diagnostic settings — no log or metric categories"
    warning_message: >-
      Diagnostic settings created for NSG resource. NSGs do NOT support any
      diagnostic setting categories (no logs, no metrics). ARM will reject with
      HTTP 400. Remove the diagnostic settings resource for NSGs entirely.

