# Anti-pattern detection — Completeness domain
#
# Detects structural gaps, incomplete scripts, and missing companion
# resources in AI-generated output.  These patterns catch issues that
# indicate the generated code is not deployment-ready.

domain: completeness
description: Structural gaps, incomplete scripts, and missing companion resources

patterns:
  - id: ANTI-COMP-001
    search_patterns:
      - "local_authentication_disabled = true"
      - "local_auth_disabled = true"
      - "disableLocalAuth: true"
      - "shared_access_key_enabled = false"
      - "allowSharedKeyAccess: false"
    safe_patterns:
      - "azurerm_user_assigned_identity"
      - "azurerm_role_assignment"
      - "azurerm_cosmosdb_sql_role_assignment"
      - "Microsoft.ManagedIdentity/userAssignedIdentities"
      - "roleAssignments"
      - "user_assigned_identity"
    correct_patterns:
      - "azurerm_user_assigned_identity"
      - "azurerm_role_assignment"
      - 'Microsoft.ManagedIdentity/userAssignedIdentities'
      - "# Include managed identity AND role assignment when disabling local auth"
    warning_message: "Local/key-based authentication is disabled but no managed identity or RBAC role assignment found in the same stage. Applications will be unable to authenticate."

  - id: ANTI-COMP-002
    search_patterns:
      - "echo -e \"${yellow}"
      - "echo -e \"${red}"
      - "echo -e \"${green}"
    safe_patterns:
      - "${nc}"
    correct_patterns:
      - 'echo -e "${YELLOW}message${NC}"'
      - 'echo -e "${RED}message${NC}"'
      - 'echo -e "${GREEN}message${NC}"'
    warning_message: "Incomplete color echo statement in deploy script — use uppercase color variables and close with ${NC}."

  - id: ANTI-COMP-003
    applies_to: ["terraform"]
    search_patterns:
      - "terraform_remote_state"
    safe_patterns: []
    correct_patterns:
      - "# Use variable inputs or data sources instead of terraform_remote_state"
    warning_message: ""

  - id: ANTI-COMP-004
    applies_to: ["terraform"]
    search_patterns:
      - "data \"azurerm_resource_group\""
      - "data \"azurerm_log_analytics_workspace\""
      - "data \"azurerm_key_vault\""
    safe_patterns:
      - "terraform_remote_state"
      - "data.terraform_remote_state"
      - "var."
    correct_patterns:
      - "data.terraform_remote_state.stage_name.outputs.resource_id"
      - "var.resource_group_name"
      - "# Reference prior-stage resources via remote state or input variables"
    warning_message: "Data source references existing resource by hardcoded name — use terraform_remote_state or variables to reference resources from prior stages."

  - id: ANTI-COMP-005
    applies_to: ["terraform"]
    search_patterns:
      - "versions.tf"
    safe_patterns:
      - "providers.tf"
    correct_patterns:
      - "providers.tf"
      - "# Consolidate terraform {}, required_providers, and backend into providers.tf only"
    warning_message: "Terraform config uses versions.tf — this WILL cause deployment failure. Provider configuration (terraform {}, required_providers, backend) must be in providers.tf only. Using both files causes duplicate required_providers blocks that break terraform init. Remove versions.tf and consolidate into providers.tf."

  - id: ANTI-COMP-006
    applies_to: ["terraform"]
    search_patterns:
      - "var.tfstate_storage_account"
      - "var.backend_storage_account"
      - "var.state_storage_account"
    safe_patterns: []
    correct_patterns:
      - 'storage_account_name = "mystorageaccount"'
      - '# Use literal values in backend blocks — variables are not supported'
      - 'backend "local" {}'
    warning_message: "Backend config uses variable references — Terraform does not support variables in backend blocks. Use literal values or omit the backend to use local state."

  - id: ANTI-COMP-007
    applies_to: ["terraform"]
    search_patterns:
      - "storage_account_name = \"\""
      - "container_name = \"\""
      - "key = \"\""
      - "resource_group_name = \"\""
    safe_patterns:
      - "backend \"local\""
    correct_patterns:
      - 'storage_account_name = "tfstate12345"'
      - 'container_name = "tfstate"'
      - 'key = "stage-name.tfstate"'
      - 'backend "local" {}'
      - "# Provide literal values or use local backend"
    warning_message: "Backend config has empty required fields — terraform init will fail. Either provide literal values or omit the backend block to use local state."

  # Detect hardcoded upstream resource names (ALZ naming patterns)
  - id: ANTI-COMP-008
    search_patterns:
      - 'queueName = "zd-'
      - 'queueName = "pi-'
      - 'queueName = "pm-'
      - 'queueName = "pc-'
      - 'name = "zdacr'
      - 'name = "zdst'
      - 'resource_group_name = "zd-rg-'
      - 'resource_group_name = "pi-rg-'
      - 'resource_group_name = "pm-rg-'
    safe_patterns:
      - "var."
      - "local."
      - "data.terraform_remote_state"
      - "data.azapi_resource"
    correct_patterns:
      - "data.terraform_remote_state.stage.outputs.queue_name"
      - "var.resource_group_name"
      - "local.resource_group_name"
    warning_message: "Hardcoded upstream resource name detected — use terraform_remote_state outputs or variables to reference resources from other stages. NEVER hardcode resource names."

  - id: ANTI-COMP-009
    search_patterns:
      - "storage blob delegator"
    safe_patterns:
      - "storage blob data contributor"
      - "storage blob data reader"
    correct_patterns:
      - "Storage Blob Data Contributor"
      - "# ba92f5b4-2d11-453d-a403-e96b0029c9fe"
    warning_message: >-
      Storage Blob Delegator role detected. This role only grants User Delegation
      Key access, NOT actual blob read/write. Use Storage Blob Data Contributor
      (ba92f5b4-2d11-453d-a403-e96b0029c9fe) for blob data access.

  - id: ANTI-COMP-010
    search_patterns:
      - 'capacitymode = "serverless"'
      - "capacitymode"
    safe_patterns:
      - "enableserverless"
    correct_patterns:
      - 'capabilities = [{ name = "EnableServerless" }]'
    warning_message: >-
      capacityMode property does NOT exist in the Cosmos DB ARM schema.
      Use capabilities = [{ name = "EnableServerless" }] to enable serverless mode.

  - id: ANTI-COMP-011
    applies_to: ["terraform"]
    search_patterns:
      - "/blobservices/default"
    safe_patterns:
      - "azapi_resource"
      - "blob_service"
    correct_patterns:
      - "parent_id = azapi_resource.blob_service.id"
    warning_message: >-
      Blob service diagnostic settings use string interpolation instead of an
      explicit blob service child resource. Create an azapi_resource for
      Microsoft.Storage/storageAccounts/blobServices and reference its .id.
