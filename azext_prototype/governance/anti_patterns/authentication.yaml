# Anti-pattern detection — Authentication domain
#
# Detects weak or deprecated authentication methods in AI-generated output.

domain: authentication
description: Authentication method and RBAC assignment detection

patterns:
  - search_patterns:
      - "sql authentication"
      - "username/password"
      - "sql_login"
      - "administrator_login_password"
    safe_patterns:
      - "do not use sql authentication"
      - "avoid sql authentication"
      - "entra authentication"
    correct_patterns:
      - 'azureADOnlyAuthentication = true'
      - "azuread_authentication_only = true"
      - "# Use Microsoft Entra authentication with managed identity"
    warning_message: "SQL authentication with username/password detected — use Microsoft Entra (Azure AD) authentication with managed identity."

  - search_patterns:
      - "access_policy {"
      - "access_policy ="
      - "access policies"
    safe_patterns:
      - "do not use access policies"
      - "avoid access policies"
      - "rbac_authorization"
    correct_patterns:
      - "enable_rbac_authorization = true"
      - 'enableRbacAuthorization = true'
      - "azurerm_role_assignment"
    warning_message: "Key Vault access policies detected — use enable_rbac_authorization = true with role assignments instead."

  - search_patterns:
      - "\"owner\""
      - "\"contributor\""
    safe_patterns:
      - "built-in role"
      - "narrowest scope"
      - "least privilege"
      - "specific role"
      - "data owner"
      - "data contributor"
      - "blob data"
      - "secrets officer"
      - "cosmos db"
      - "signalr service owner"
      - "rest api owner"
      - "service bus data"
      - "redis cache contributor"
      - "acr"
    correct_patterns:
      - '"Reader"'
      - '"Storage Blob Data Contributor"'
      - '"Key Vault Secrets User"'
      - '"Cosmos DB Account Reader Role"'
      - "# Use the most specific built-in role at the narrowest scope"
    warning_message: "Broad role assignment detected (Owner/Contributor at subscription/RG scope) -- use the most specific built-in role at the narrowest scope."
