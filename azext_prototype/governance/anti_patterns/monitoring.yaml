# Anti-pattern detection — Monitoring domain
#
# Detects missing or disabled observability configurations in AI-generated output.

domain: monitoring
description: Logging, diagnostics, and observability gap detection

patterns:
  - id: ANTI-MON-001
    search_patterns:
      - "retention_in_days = 0"
      - "retention_days = 0"
    safe_patterns: []
    correct_patterns:
      - "retention_in_days = 30"
      - "retentionInDays = 30"
    warning_message: "Log retention set to 0 days — configure at least 30 days for compliance and incident investigation."

  - id: ANTI-MON-002
    search_patterns:
      - "enabled_log_category = []"
      - "logs_enabled = false"
      - "metrics_enabled = false"
    safe_patterns: []
    correct_patterns:
      - "logs_enabled = true"
      - "metrics_enabled = true"
      - 'enabled = true'
      - "# Enable diagnostic settings for all PaaS resources"
    warning_message: "Diagnostic logs or metrics disabled — enable logging for all PaaS resources."

  - id: ANTI-MON-003
    search_patterns:
      - "instrumentation_key"
      - "instrumentationkey"
    safe_patterns:
      - "# deprecated"
      - "use connection_string"
      - "do not use instrumentationkey"
    correct_patterns:
      - "connection_string"
      - "# Use connection_string instead of InstrumentationKey"
    warning_message: "InstrumentationKey output detected — InstrumentationKey is deprecated and does not support regional ingestion. Use connection_string instead."
