    url: "https://learn.microsoft.com/azure/azure-monitor/app/app-insights-overview"
  - title: "KQL query language reference"
    url: "https://learn.microsoft.com/azure/data-explorer/kusto/query/"
  - title: "Metric alerts"
    url: "https://learn.microsoft.com/azure/azure-monitor/alerts/alerts-metric-overview"
  - title: "Distributed tracing"
    url: "https://learn.microsoft.com/azure/azure-monitor/app/distributed-trace-data"
  - title: "Availability tests"
    url: "https://learn.microsoft.com/azure/azure-monitor/app/availability-overview"
