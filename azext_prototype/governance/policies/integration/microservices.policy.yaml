    url: "https://learn.microsoft.com/azure/container-apps/connect-apps"
  - title: "Container Apps Dapr integration"
    url: "https://learn.microsoft.com/azure/container-apps/dapr-overview"
  - title: "Container Apps health probes"
    url: "https://learn.microsoft.com/azure/container-apps/health-probes"
  - title: "Application Insights with Container Apps"
    url: "https://learn.microsoft.com/azure/container-apps/opentelemetry-agents"
  - title: "Dapr resiliency policies"
    url: "https://docs.dapr.io/operations/resiliency/policies/"
