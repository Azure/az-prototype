patterns:
  - name: "Event Grid to Function App with dead-letter"
    description: "System topic subscription delivering to Azure Function with managed identity and dead-letter storage"
  - name: "Service Bus trigger with managed identity"
    description: "Function App consuming Service Bus queue using managed identity connection string-free binding"
  - name: "Event Hub to Stream Analytics pipeline"
    description: "Real-time stream processing with Event Hub input, Stream Analytics windowed query, and blob output"

anti_patterns:
  - description: "Do not use connection strings for event source authentication"
    instead: "Use managed identity with RBAC role assignments for all event source connections"
  - description: "Do not skip dead-letter configuration on any event subscription or queue"
    instead: "Always configure dead-letter storage for Event Grid and ensure deadLetteringOnMessageExpiration for Service Bus"
  - description: "Do not process events without idempotency checks"
    instead: "Use message deduplication (requiresDuplicateDetection) and implement idempotent event handlers"

