# yaml-language-server: $schema=../../policy.schema.json
apiVersion: v1
kind: policy
metadata:
  name: managed-grafana
  category: azure
  services: [managed-grafana]
  last_reviewed: "2026-03-27"

rules:
  - id: AZ-GRF-001
    severity: required
    description: "Deploy Azure Managed Grafana with managed identity, deterministic outbound IP, and no public access"
    rationale: "Grafana dashboards access sensitive metrics; managed identity secures data source connections, deterministic IP enables firewall rules"
    applies_to: [terraform-agent, bicep-agent, cloud-architect]
    terraform_pattern: |
      resource "azapi_resource" "grafana" {
        type      = "Microsoft.Dashboard/grafana@2023-09-01"
        name      = var.grafana_name
        location  = var.location
        parent_id = var.resource_group_id

        identity {
          type = "SystemAssigned"
        }

        body = {
          sku = {
            name = "Standard"
          }
          properties = {
            zoneRedundancy           = "Enabled"
            publicNetworkAccess      = "Disabled"
            deterministicOutboundIP  = "Enabled"
            autoGeneratedDomainNameLabelScope = "TenantReuse"
            apiKey                   = "Disabled"
            grafanaIntegrations = {
              azureMonitorWorkspaceIntegrations = [
                {
                  azureMonitorWorkspaceResourceId = var.monitor_workspace_id
                }
              ]
            }
          }
        }
      }
    bicep_pattern: |
      resource grafana 'Microsoft.Dashboard/grafana@2023-09-01' = {
        name: grafanaName
        location: location
        identity: {
          type: 'SystemAssigned'
        }
        sku: {
          name: 'Standard'
        }
        properties: {
          zoneRedundancy: 'Enabled'
          publicNetworkAccess: 'Disabled'
          deterministicOutboundIP: 'Enabled'
          autoGeneratedDomainNameLabelScope: 'TenantReuse'
          apiKey: 'Disabled'
          grafanaIntegrations: {
            azureMonitorWorkspaceIntegrations: [
              {
                azureMonitorWorkspaceResourceId: monitorWorkspaceId
              }
            ]
          }
        }
      }
    companion_resources:
      - type: "Microsoft.Network/privateEndpoints@2024-01-01"
        name: "pe-grafana"
        description: "Private endpoint for Managed Grafana to secure dashboard access"
        terraform_pattern: |
          resource "azapi_resource" "pe_grafana" {
            type      = "Microsoft.Network/privateEndpoints@2024-01-01"
            name      = "pe-${var.grafana_name}"
            location  = var.location
            parent_id = var.resource_group_id

            body = {
              properties = {
                subnet = {
                  id = var.subnet_id
                }
                privateLinkServiceConnections = [
                  {
                    name = "grafana-connection"
                    properties = {
                      privateLinkServiceId = azapi_resource.grafana.id
                      groupIds             = ["grafana"]
                    }
                  }
                ]
              }
            }
          }
        bicep_pattern: |
          resource peGrafana 'Microsoft.Network/privateEndpoints@2024-01-01' = {
            name: 'pe-${grafanaName}'
            location: location
            properties: {
              subnet: {
                id: subnetId
              }
              privateLinkServiceConnections: [
                {
                  name: 'grafana-connection'
                  properties: {
                    privateLinkServiceId: grafana.id
                    groupIds: ['grafana']
                  }
                }
              ]
            }
          }
      - type: "Microsoft.Network/privateDnsZones@2024-06-01"
        name: "privatelink.grafana.azure.com"
        description: "Private DNS zone for Managed Grafana private endpoint resolution"
      - type: "Microsoft.Authorization/roleAssignments@2022-04-01"
        name: "Grafana Admin / Editor / Viewer"
        description: "RBAC role assignments for Grafana dashboard access — use Viewer for read-only, Editor for dashboard creation"
      - type: "Microsoft.Authorization/roleAssignments@2022-04-01"
        name: "Monitoring Reader on data sources"
        description: "Grant Grafana managed identity Monitoring Reader on Log Analytics and Azure Monitor workspaces"
    prohibitions:
      - "Never enable API key authentication — use Microsoft Entra auth via managed identity"
      - "Never set publicNetworkAccess to Enabled without compensating network controls"
      - "Never grant Grafana Admin to all users — use Viewer/Editor for least privilege"
      - "Never hardcode data source credentials — use managed identity for Azure Monitor data sources"
      - "Never use Essential tier for production — it lacks zone redundancy, private link, and SMTP support"

  - id: AZ-GRF-002
    severity: required
    description: "Disable API key authentication — use Microsoft Entra ID only"
    rationale: "API keys bypass Entra ID authentication and cannot be audited per-user"
    applies_to: [terraform-agent, bicep-agent, cloud-architect]

  - id: AZ-GRF-003
    severity: recommended
    description: "Enable zone redundancy for high availability"
    rationale: "Zone redundancy ensures dashboard availability during availability zone failures"
    applies_to: [terraform-agent, bicep-agent, cloud-architect]

  - id: AZ-GRF-004
    severity: recommended
    description: "Grant Grafana managed identity Monitoring Reader role on all data sources"
    rationale: "Managed identity access to Azure Monitor eliminates credential management for data source connections"
    applies_to: [terraform-agent, bicep-agent, cloud-architect, monitoring-agent]

patterns:
  - name: "Managed Grafana with private endpoint and Azure Monitor integration"
    description: "Standard Grafana with private access, managed identity, zone redundancy, and Azure Monitor data sources"

anti_patterns:
  - description: "Do not enable API key authentication"
    instead: "Set apiKey to Disabled and use Microsoft Entra ID authentication"
  - description: "Do not configure data sources with stored credentials"
    instead: "Use managed identity with Monitoring Reader role for Azure Monitor data sources"

references:
  - title: "Azure Managed Grafana documentation"
    url: "https://learn.microsoft.com/azure/managed-grafana/overview"
  - title: "Managed Grafana authentication"
    url: "https://learn.microsoft.com/azure/managed-grafana/how-to-authentication-permissions"
