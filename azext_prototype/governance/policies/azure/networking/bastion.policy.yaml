apiVersion: v1
kind: policy
metadata:
  name: bastion
  category: azure
  services: [bastion]
  last_reviewed: "2026-03-27"

rules:
  - id: BAS-001
    severity: required
    description: "Deploy Azure Bastion with Standard SKU for production workloads"
    rationale: "Standard SKU provides native client support, IP-based connections, shareable links, and Kerberos auth"
    applies_to: [terraform-agent, bicep-agent, cloud-architect]
    terraform_pattern: |
      resource "azapi_resource" "bastion" {
        type      = "Microsoft.Network/bastionHosts@2024-01-01"
        name      = var.bastion_name
        location  = var.location
        parent_id = var.resource_group_id
        body = {
          sku = {
            name = "Standard"
          }
          properties = {
            ipConfigurations = [
              {
                name = "bastion-ip-config"
                properties = {
                  subnet = {
                    id = var.bastion_subnet_id
                  }
                  publicIPAddress = {
                    id = azapi_resource.bastion_public_ip.id
                  }
                }
              }
            ]
            enableTunneling    = true
            enableFileCopy     = true
            enableShareableLink = false
          }
        }
      }
    bicep_pattern: |
      resource bastion 'Microsoft.Network/bastionHosts@2024-01-01' = {
        name: bastionName
        location: location
        sku: {
          name: 'Standard'
        }
        properties: {
          ipConfigurations: [
            {
              name: 'bastion-ip-config'
              properties: {
                subnet: {
                  id: bastionSubnetId
                }
                publicIPAddress: {
                  id: bastionPublicIp.id
                }
              }
            }
          ]
          enableTunneling: true
          enableFileCopy: true
          enableShareableLink: false
        }
      }
    companion_resources:
      - "Microsoft.Network/publicIPAddresses (Standard SKU, static, for Bastion frontend)"
      - "Microsoft.Network/virtualNetworks/subnets (dedicated AzureBastionSubnet with /26 or larger)"
      - "Microsoft.Network/networkSecurityGroups (NSG on AzureBastionSubnet with required rules)"
      - "Microsoft.Insights/diagnosticSettings (route logs to Log Analytics)"
    prohibitions:
      - "Do not use Basic SKU for production — it lacks tunneling, file copy, and native client support"
      - "Do not enable shareable links unless explicitly required — they bypass Azure AD conditional access"
      - "Do not deploy Bastion in a subnet other than AzureBastionSubnet"
      - "Do not use a subnet smaller than /26 for AzureBastionSubnet"

  - id: BAS-002
    severity: required
    description: "Create a dedicated AzureBastionSubnet with minimum /26 prefix and required NSG"
    rationale: "Azure Bastion requires a specifically named subnet with minimum size and mandatory NSG rules"
    applies_to: [terraform-agent, bicep-agent, cloud-architect]
    terraform_pattern: |
      resource "azapi_resource" "bastion_subnet" {
        type      = "Microsoft.Network/virtualNetworks/subnets@2024-01-01"
        name      = "AzureBastionSubnet"
        parent_id = azapi_resource.vnet.id
        body = {
          properties = {
            addressPrefix = var.bastion_subnet_prefix
            networkSecurityGroup = {
              id = azapi_resource.bastion_nsg.id
            }
          }
        }
      }
    bicep_pattern: |
      resource bastionSubnet 'Microsoft.Network/virtualNetworks/subnets@2024-01-01' = {
        parent: vnet
        name: 'AzureBastionSubnet'
        properties: {
          addressPrefix: bastionSubnetPrefix
          networkSecurityGroup: {
            id: bastionNsg.id
          }
        }
      }
    companion_resources:
      - "Microsoft.Network/networkSecurityGroups (with required inbound/outbound rules for Bastion)"
    prohibitions:
      - "Do not name the subnet anything other than AzureBastionSubnet"
      - "Do not omit NSG from AzureBastionSubnet"

  - id: BAS-003
    severity: required
    description: "Configure NSG on AzureBastionSubnet with mandatory inbound and outbound rules"
    rationale: "Azure Bastion requires specific ports for GatewayManager, HTTPS ingress, and data plane communication"
    applies_to: [terraform-agent, bicep-agent, cloud-architect]
    terraform_pattern: |
      resource "azapi_resource" "bastion_nsg" {
        type      = "Microsoft.Network/networkSecurityGroups@2024-01-01"
        name      = var.bastion_nsg_name
        location  = var.location
        parent_id = var.resource_group_id
        body = {
          properties = {
            securityRules = [
              {
                name = "AllowHttpsInbound"
                properties = {
                  priority                 = 120
                  direction                = "Inbound"
                  access                   = "Allow"
                  protocol                 = "Tcp"
                  sourcePortRange          = "*"
                  destinationPortRange     = "443"
                  sourceAddressPrefix      = "Internet"
                  destinationAddressPrefix = "*"
                }
              },
              {
                name = "AllowGatewayManagerInbound"
                properties = {
                  priority                 = 130
                  direction                = "Inbound"
                  access                   = "Allow"
                  protocol                 = "Tcp"
                  sourcePortRange          = "*"
                  destinationPortRange     = "443"
                  sourceAddressPrefix      = "GatewayManager"
                  destinationAddressPrefix = "*"
                }
              },
              {
                name = "AllowBastionHostCommunication"
                properties = {
                  priority                 = 150
                  direction                = "Inbound"
                  access                   = "Allow"
                  protocol                 = "*"
                  sourcePortRange          = "*"
                  destinationPortRanges    = ["8080", "5701"]
                  sourceAddressPrefix      = "VirtualNetwork"
                  destinationAddressPrefix = "VirtualNetwork"
                }
              },
              {
                name = "AllowSshRdpOutbound"
                properties = {
                  priority                 = 100
                  direction                = "Outbound"
                  access                   = "Allow"
                  protocol                 = "Tcp"
                  sourcePortRange          = "*"
                  destinationPortRanges    = ["22", "3389"]
                  sourceAddressPrefix      = "*"
                  destinationAddressPrefix = "VirtualNetwork"
                }
              },
              {
                name = "AllowAzureCloudOutbound"
                properties = {
                  priority                 = 110
                  direction                = "Outbound"
                  access                   = "Allow"
                  protocol                 = "Tcp"
                  sourcePortRange          = "*"
                  destinationPortRange     = "443"
                  sourceAddressPrefix      = "*"
                  destinationAddressPrefix = "AzureCloud"
                }
              },
              {
                name = "AllowBastionCommunicationOutbound"
                properties = {
                  priority                 = 120
                  direction                = "Outbound"
                  access                   = "Allow"
                  protocol                 = "*"
                  sourcePortRange          = "*"
                  destinationPortRanges    = ["8080", "5701"]
                  sourceAddressPrefix      = "VirtualNetwork"
                  destinationAddressPrefix = "VirtualNetwork"
                }
              }
            ]
          }
        }
      }
    bicep_pattern: |
      resource bastionNsg 'Microsoft.Network/networkSecurityGroups@2024-01-01' = {
        name: bastionNsgName
        location: location
        properties: {
          securityRules: [
            {
              name: 'AllowHttpsInbound'
              properties: {
                priority: 120
                direction: 'Inbound'
                access: 'Allow'
                protocol: 'Tcp'
                sourcePortRange: '*'
                destinationPortRange: '443'
                sourceAddressPrefix: 'Internet'
                destinationAddressPrefix: '*'
              }
            }
            {
              name: 'AllowGatewayManagerInbound'
              properties: {
                priority: 130
                direction: 'Inbound'
                access: 'Allow'
                protocol: 'Tcp'
                sourcePortRange: '*'
                destinationPortRange: '443'
                sourceAddressPrefix: 'GatewayManager'
                destinationAddressPrefix: '*'
              }
            }
            {
              name: 'AllowBastionHostCommunication'
              properties: {
                priority: 150
                direction: 'Inbound'
                access: 'Allow'
                protocol: '*'
                sourcePortRange: '*'
                destinationPortRanges: ['8080', '5701']
                sourceAddressPrefix: 'VirtualNetwork'
                destinationAddressPrefix: 'VirtualNetwork'
              }
            }
            {
              name: 'AllowSshRdpOutbound'
              properties: {
                priority: 100
                direction: 'Outbound'
                access: 'Allow'
                protocol: 'Tcp'
                sourcePortRange: '*'
                destinationPortRanges: ['22', '3389']
                sourceAddressPrefix: '*'
                destinationAddressPrefix: 'VirtualNetwork'
              }
            }
            {
              name: 'AllowAzureCloudOutbound'
              properties: {
                priority: 110
                direction: 'Outbound'
                access: 'Allow'
                protocol: 'Tcp'
                sourcePortRange: '*'
                destinationPortRange: '443'
                sourceAddressPrefix: '*'
                destinationAddressPrefix: 'AzureCloud'
              }
            }
            {
              name: 'AllowBastionCommunicationOutbound'
              properties: {
                priority: 120
                direction: 'Outbound'
                access: 'Allow'
                protocol: '*'
                sourcePortRange: '*'
                destinationPortRanges: ['8080', '5701']
                sourceAddressPrefix: 'VirtualNetwork'
                destinationAddressPrefix: 'VirtualNetwork'
              }
            }
          ]
        }
      }
    companion_resources: []
    prohibitions:
      - "Do not omit mandatory GatewayManager inbound rule — Bastion will fail health checks"
      - "Do not allow RDP/SSH inbound from Internet — only Bastion should broker these connections"

  - id: BAS-004
    severity: recommended
    description: "Enable diagnostic settings for Bastion audit and session logs"
    rationale: "Audit logs track who connected to which VM, required for compliance"
    applies_to: [terraform-agent, bicep-agent, cloud-architect, monitoring-agent]
    terraform_pattern: |
      resource "azapi_resource" "bastion_diagnostics" {
        type      = "Microsoft.Insights/diagnosticSettings@2021-05-01-preview"
        name      = "diag-bastion"
        parent_id = azapi_resource.bastion.id
        body = {
          properties = {
            workspaceId = var.log_analytics_workspace_id
            logs = [
              {
                category = "BastionAuditLogs"
                enabled  = true
              }
            ]
            metrics = [
              {
                category = "AllMetrics"
                enabled  = true
              }
            ]
          }
        }
      }
    bicep_pattern: |
      resource bastionDiagnostics 'Microsoft.Insights/diagnosticSettings@2021-05-01-preview' = {
        name: 'diag-bastion'
        scope: bastion
        properties: {
          workspaceId: logAnalyticsWorkspaceId
          logs: [
            {
              category: 'BastionAuditLogs'
              enabled: true
            }
          ]
          metrics: [
            {
              category: 'AllMetrics'
              enabled: true
            }
          ]
        }
      }
    companion_resources:
      - "Microsoft.OperationalInsights/workspaces (Log Analytics workspace)"
    prohibitions:
      - "Do not skip BastionAuditLogs — they are essential for session tracking and compliance"

patterns:
  - name: "Azure Bastion Standard with full security"
    description: "Standard SKU Bastion with dedicated subnet, NSG, and diagnostics"
    example: |
      # See BAS-001 through BAS-004 for complete azapi_resource patterns

anti_patterns:
  - description: "Do not expose VM RDP/SSH ports directly to the internet"
    instead: "Use Azure Bastion as a managed jump host for all remote access"
  - description: "Do not deploy Bastion without an NSG on AzureBastionSubnet"
    instead: "Apply NSG with mandatory Bastion rules per Microsoft documentation"

references:
  - title: "Azure Bastion documentation"
    url: "https://learn.microsoft.com/azure/bastion/bastion-overview"
  - title: "NSG rules for Azure Bastion"
    url: "https://learn.microsoft.com/azure/bastion/bastion-nsg"
