apiVersion: v1
kind: policy
metadata:
  name: recovery-services
  category: azure
  services: [recovery-services]
  last_reviewed: "2026-03-27"

rules:
  - id: AZ-RSV-001
    severity: required
    description: "Deploy Recovery Services vault with geo-redundant storage, soft delete, and immutability"
    rationale: "GRS protects against regional disasters; soft delete prevents accidental data loss; immutability prevents ransomware"
    applies_to: [terraform-agent, bicep-agent, cloud-architect]
    terraform_pattern: |
      resource "azapi_resource" "recovery_vault" {
        type      = "Microsoft.RecoveryServices/vaults@2024-04-01"
        name      = var.recovery_vault_name
        location  = var.location
        parent_id = var.resource_group_id
        identity {
          type = "SystemAssigned"
        }
        body = {
          sku = {
            name = "Standard"
          }
          properties = {
            publicNetworkAccess = "Disabled"
            securitySettings = {
              softDeleteSettings = {
                softDeleteState           = "Enabled"
                softDeleteRetentionPeriodInDays = 14
                enhancedSecurityState     = "Enabled"
              }
              immutabilitySettings = {
                state = "Unlocked"
              }
            }
          }
        }
      }
    bicep_pattern: |
      resource recoveryVault 'Microsoft.RecoveryServices/vaults@2024-04-01' = {
        name: recoveryVaultName
        location: location
        identity: {
          type: 'SystemAssigned'
        }
        sku: {
          name: 'Standard'
        }
        properties: {
          publicNetworkAccess: 'Disabled'
          securitySettings: {
            softDeleteSettings: {
              softDeleteState: 'Enabled'
              softDeleteRetentionPeriodInDays: 14
              enhancedSecurityState: 'Enabled'
            }
            immutabilitySettings: {
              state: 'Unlocked'
            }
          }
        }
      }
    companion_resources:
      - "Microsoft.RecoveryServices/vaults/backupPolicies (backup schedule and retention policies)"
      - "Microsoft.RecoveryServices/vaults/backupFabrics/protectionContainers/protectedItems (protected resources)"
      - "Microsoft.Network/privateEndpoints (private endpoint with groupId 'AzureBackup')"
      - "Microsoft.Network/privateDnsZones (privatelink.region.backup.windowsazure.com)"
      - "Microsoft.Insights/diagnosticSettings (route logs to Log Analytics)"
    prohibitions:
      - "Do not disable soft delete — backup data cannot be recovered after deletion"
      - "Do not disable enhanced security (MUA) — it protects against unauthorized backup modifications"
      - "Do not enable publicNetworkAccess — use private endpoints"
      - "Do not set immutability to Disabled without explicit business justification"

  - id: AZ-RSV-002
    severity: required
    description: "Configure storage replication as geo-redundant before protecting any items"
    rationale: "Storage replication cannot be changed after backup items are registered; GRS is required for DR"
    applies_to: [terraform-agent, bicep-agent, cloud-architect]
    terraform_pattern: |
      resource "azapi_resource" "vault_storage_config" {
        type      = "Microsoft.RecoveryServices/vaults/backupstorageconfig@2024-04-01"
        name      = "vaultstorageconfig"
        parent_id = azapi_resource.recovery_vault.id
        body = {
          properties = {
            storageModelType     = "GeoRedundant"
            crossRegionRestoreFlag = true
          }
        }
      }
    bicep_pattern: |
      resource vaultStorageConfig 'Microsoft.RecoveryServices/vaults/backupstorageconfig@2024-04-01' = {
        parent: recoveryVault
        name: 'vaultstorageconfig'
        properties: {
          storageModelType: 'GeoRedundant'
          crossRegionRestoreFlag: true
        }
      }
    companion_resources: []
    prohibitions:
      - "Do not use LocallyRedundant for production — data loss on regional failure"
      - "Do not register backup items before setting storage replication — it cannot be changed later"

  - id: AZ-RSV-003
    severity: required
    description: "Create backup policies with daily backups and appropriate retention tiers"
    rationale: "Backup policies define RPO, RTO, and retention compliance — they must match DR requirements"
    applies_to: [terraform-agent, bicep-agent, cloud-architect]
    terraform_pattern: |
      resource "azapi_resource" "vm_backup_policy" {
        type      = "Microsoft.RecoveryServices/vaults/backupPolicies@2024-04-01"
        name      = var.policy_name
        parent_id = azapi_resource.recovery_vault.id
        body = {
          properties = {
            backupManagementType = "AzureIaasVM"
            instantRpRetentionRangeInDays = 5
            policyType = "V2"
            schedulePolicy = {
              schedulePolicyType      = "SimpleSchedulePolicyV2"
              scheduleRunFrequency    = "Daily"
              scheduleRunTimes        = ["2024-01-01T02:00:00Z"]
              dailySchedule = {
                scheduleRunTimes = ["2024-01-01T02:00:00Z"]
              }
            }
            retentionPolicy = {
              retentionPolicyType = "LongTermRetentionPolicy"
              dailySchedule = {
                retentionTimes    = ["2024-01-01T02:00:00Z"]
                retentionDuration = {
                  count        = 30
                  durationType = "Days"
                }
              }
              weeklySchedule = {
                daysOfTheWeek     = ["Sunday"]
                retentionTimes    = ["2024-01-01T02:00:00Z"]
                retentionDuration = {
                  count        = 12
                  durationType = "Weeks"
                }
              }
              monthlySchedule = {
                retentionScheduleFormatType = "Daily"
                retentionScheduleDaily = {
                  daysOfTheMonth = [
                    {
                      date     = 1
                      isLast   = false
                    }
                  ]
                }
                retentionTimes    = ["2024-01-01T02:00:00Z"]
                retentionDuration = {
                  count        = 12
                  durationType = "Months"
                }
              }
            }
            timeZone = "UTC"
          }
        }
      }
    bicep_pattern: |
      resource vmBackupPolicy 'Microsoft.RecoveryServices/vaults/backupPolicies@2024-04-01' = {
        parent: recoveryVault
        name: policyName
        properties: {
          backupManagementType: 'AzureIaasVM'
          instantRpRetentionRangeInDays: 5
          policyType: 'V2'
          schedulePolicy: {
            schedulePolicyType: 'SimpleSchedulePolicyV2'
            scheduleRunFrequency: 'Daily'
            scheduleRunTimes: ['2024-01-01T02:00:00Z']
            dailySchedule: {
              scheduleRunTimes: ['2024-01-01T02:00:00Z']
            }
          }
          retentionPolicy: {
            retentionPolicyType: 'LongTermRetentionPolicy'
            dailySchedule: {
              retentionTimes: ['2024-01-01T02:00:00Z']
              retentionDuration: {
                count: 30
                durationType: 'Days'
              }
            }
            weeklySchedule: {
              daysOfTheWeek: ['Sunday']
              retentionTimes: ['2024-01-01T02:00:00Z']
              retentionDuration: {
                count: 12
                durationType: 'Weeks'
              }
            }
            monthlySchedule: {
              retentionScheduleFormatType: 'Daily'
              retentionScheduleDaily: {
                daysOfTheMonth: [
                  {
                    date: 1
                    isLast: false
                  }
                ]
              }
              retentionTimes: ['2024-01-01T02:00:00Z']
              retentionDuration: {
                count: 12
                durationType: 'Months'
              }
            }
          }
          timeZone: 'UTC'
        }
      }
    companion_resources:
      - "Microsoft.RecoveryServices/vaults (parent recovery vault)"
    prohibitions:
      - "Do not set daily retention below 7 days for production"
      - "Do not skip weekly or monthly retention for compliance-regulated workloads"

  - id: AZ-RSV-004
    severity: recommended
    description: "Create private endpoint for Recovery Services vault"
    rationale: "Private endpoint ensures all backup traffic stays on the Azure backbone"
    applies_to: [terraform-agent, bicep-agent, cloud-architect]
    terraform_pattern: |
      resource "azapi_resource" "rsv_pe" {
        type      = "Microsoft.Network/privateEndpoints@2024-01-01"
        name      = "${var.recovery_vault_name}-pe"
        location  = var.location
        parent_id = var.resource_group_id
        body = {
          properties = {
            subnet = {
              id = var.pe_subnet_id
            }
            privateLinkServiceConnections = [
              {
                name = "${var.recovery_vault_name}-backup"
                properties = {
                  privateLinkServiceId = azapi_resource.recovery_vault.id
                  groupIds             = ["AzureBackup"]
                }
              }
            ]
          }
        }
      }
    bicep_pattern: |
      resource rsvPe 'Microsoft.Network/privateEndpoints@2024-01-01' = {
        name: '${recoveryVaultName}-pe'
        location: location
        properties: {
          subnet: {
            id: peSubnetId
          }
          privateLinkServiceConnections: [
            {
              name: '${recoveryVaultName}-backup'
              properties: {
                privateLinkServiceId: recoveryVault.id
                groupIds: ['AzureBackup']
              }
            }
          ]
        }
      }
    companion_resources:
      - "Microsoft.Network/privateDnsZones (privatelink.{region}.backup.windowsazure.com)"
      - "Microsoft.Network/privateDnsZones (privatelink.blob.core.windows.net for backup data)"
      - "Microsoft.Network/privateDnsZones (privatelink.queue.core.windows.net for backup communication)"
    prohibitions:
      - "Do not skip DNS zone configuration — backup operations require multiple DNS zones"

  - id: AZ-RSV-005
    severity: recommended
    description: "Enable diagnostic settings for Recovery Services vault"
    rationale: "Monitor backup job status, restore operations, and policy compliance"
    applies_to: [terraform-agent, bicep-agent, cloud-architect, monitoring-agent]
    terraform_pattern: |
      resource "azapi_resource" "rsv_diagnostics" {
        type      = "Microsoft.Insights/diagnosticSettings@2021-05-01-preview"
        name      = "diag-recovery-vault"
        parent_id = azapi_resource.recovery_vault.id
        body = {
          properties = {
            workspaceId = var.log_analytics_workspace_id
            logs = [
              {
                category = "CoreAzureBackup"
                enabled  = true
              },
              {
                category = "AddonAzureBackupJobs"
                enabled  = true
              },
              {
                category = "AddonAzureBackupAlerts"
                enabled  = true
              },
              {
                category = "AddonAzureBackupPolicy"
                enabled  = true
              },
              {
                category = "AddonAzureBackupStorage"
                enabled  = true
              },
              {
                category = "AddonAzureBackupProtectedInstance"
                enabled  = true
              }
            ]
          }
        }
      }
    bicep_pattern: |
      resource rsvDiagnostics 'Microsoft.Insights/diagnosticSettings@2021-05-01-preview' = {
        name: 'diag-recovery-vault'
        scope: recoveryVault
        properties: {
          workspaceId: logAnalyticsWorkspaceId
          logs: [
            {
              category: 'CoreAzureBackup'
              enabled: true
            }
            {
              category: 'AddonAzureBackupJobs'
              enabled: true
            }
            {
              category: 'AddonAzureBackupAlerts'
              enabled: true
            }
            {
              category: 'AddonAzureBackupPolicy'
              enabled: true
            }
            {
              category: 'AddonAzureBackupStorage'
              enabled: true
            }
            {
              category: 'AddonAzureBackupProtectedInstance'
              enabled: true
            }
          ]
        }
      }
    companion_resources:
      - "Microsoft.OperationalInsights/workspaces (Log Analytics workspace)"
    prohibitions:
      - "Do not omit AddonAzureBackupJobs logs — they are essential for monitoring backup success rates"

patterns:
  - name: "Recovery Services vault with GRS, soft delete, and private endpoint"
    description: "Production Recovery Services vault with geo-redundancy, immutability, and private connectivity"
    example: |
      # See RSV-001 through RSV-005 for complete azapi_resource patterns

anti_patterns:
  - description: "Do not use locally redundant storage for production Recovery Services vaults"
    instead: "Use GeoRedundant storage and enable cross-region restore"
  - description: "Do not disable soft delete or enhanced security"
    instead: "Keep both enabled for ransomware protection and accidental deletion recovery"

references:
  - title: "Recovery Services vault documentation"
    url: "https://learn.microsoft.com/azure/backup/backup-azure-recovery-services-vault-overview"
  - title: "Recovery Services vault security"
    url: "https://learn.microsoft.com/azure/backup/security-overview"
