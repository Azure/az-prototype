# yaml-language-server: $schema=../../policy.schema.json
apiVersion: v1
kind: policy
metadata:
  name: front-door
  category: azure
  services: [front-door]
  last_reviewed: "2026-03-27"

rules:
  - id: AZ-AFD-001
    severity: required
    description: "Deploy Azure Front Door Premium with managed identity, WAF policy, and end-to-end TLS"
    rationale: "Front Door is the global entry point; WAF protects against OWASP threats and DDoS; Premium enables private link origins"
    applies_to: [terraform-agent, bicep-agent, cloud-architect]
    terraform_pattern: |
      resource "azapi_resource" "front_door" {
        type      = "Microsoft.Cdn/profiles@2024-02-01"
        name      = var.front_door_name
        location  = "global"
        parent_id = var.resource_group_id

        identity {
          type = "SystemAssigned"
        }

        body = {
          sku = {
            name = "Premium_AzureFrontDoor"
          }
          properties = {
            originResponseTimeoutSeconds = 60
          }
        }
      }
    bicep_pattern: |
      resource frontDoor 'Microsoft.Cdn/profiles@2024-02-01' = {
        name: frontDoorName
        location: 'global'
        identity: {
          type: 'SystemAssigned'
        }
        sku: {
          name: 'Premium_AzureFrontDoor'
        }
        properties: {
          originResponseTimeoutSeconds: 60
        }
      }
    companion_resources:
      - type: "Microsoft.Cdn/profiles/afdEndpoints@2024-02-01"
        name: "afd-endpoint"
        description: "Front Door endpoint for routing traffic"
        terraform_pattern: |
          resource "azapi_resource" "afd_endpoint" {
            type      = "Microsoft.Cdn/profiles/afdEndpoints@2024-02-01"
            name      = var.endpoint_name
            location  = "global"
            parent_id = azapi_resource.front_door.id

            body = {
              properties = {
                enabledState = "Enabled"
                autoGeneratedDomainNameLabelScope = "TenantReuse"
              }
            }
          }
        bicep_pattern: |
          resource afdEndpoint 'Microsoft.Cdn/profiles/afdEndpoints@2024-02-01' = {
            name: endpointName
            parent: frontDoor
            location: 'global'
            properties: {
              enabledState: 'Enabled'
              autoGeneratedDomainNameLabelScope: 'TenantReuse'
            }
          }
      - type: "Microsoft.Cdn/profiles/securityPolicies@2024-02-01"
        name: "security-policy"
        description: "WAF security policy association for the Front Door endpoint"
        terraform_pattern: |
          resource "azapi_resource" "afd_security_policy" {
            type      = "Microsoft.Cdn/profiles/securityPolicies@2024-02-01"
            name      = "secpol-${var.front_door_name}"
            parent_id = azapi_resource.front_door.id

            body = {
              properties = {
                parameters = {
                  type = "WebApplicationFirewall"
                  wafPolicy = {
                    id = azapi_resource.waf_policy.id
                  }
                  associations = [
                    {
                      domains = [
                        {
                          id = azapi_resource.afd_endpoint.id
                        }
                      ]
                      patternsToMatch = ["/*"]
                    }
                  ]
                }
              }
            }
          }
        bicep_pattern: |
          resource afdSecurityPolicy 'Microsoft.Cdn/profiles/securityPolicies@2024-02-01' = {
            name: 'secpol-${frontDoorName}'
            parent: frontDoor
            properties: {
              parameters: {
                type: 'WebApplicationFirewall'
                wafPolicy: {
                  id: wafPolicy.id
                }
                associations: [
                  {
                    domains: [
                      {
                        id: afdEndpoint.id
                      }
                    ]
                    patternsToMatch: ['/*']
                  }
                ]
              }
            }
          }
      - type: "Microsoft.Cdn/profiles/originGroups@2024-02-01"
        name: "origin-group"
        description: "Origin group with health probes and load balancing configuration"
      - type: "Microsoft.Cdn/profiles/originGroups/origins@2024-02-01"
        name: "origin"
        description: "Private link-enabled origin for secure backend connectivity (Premium SKU)"
      - type: "Microsoft.Insights/diagnosticSettings@2021-05-01-preview"
        name: "diag-afd"
        description: "Diagnostic settings for access logs, WAF logs, and health probe logs"
        terraform_pattern: |
          resource "azapi_resource" "diag_afd" {
            type      = "Microsoft.Insights/diagnosticSettings@2021-05-01-preview"
            name      = "diag-${var.front_door_name}"
            parent_id = azapi_resource.front_door.id

            body = {
              properties = {
                workspaceId = var.log_analytics_workspace_id
                logs = [
                  {
                    categoryGroup = "allLogs"
                    enabled       = true
                  }
                ]
                metrics = [
                  {
                    category = "AllMetrics"
                    enabled  = true
                  }
                ]
              }
            }
          }
        bicep_pattern: |
          resource diagAfd 'Microsoft.Insights/diagnosticSettings@2021-05-01-preview' = {
            name: 'diag-${frontDoorName}'
            scope: frontDoor
            properties: {
              workspaceId: logAnalyticsWorkspaceId
              logs: [
                {
                  categoryGroup: 'allLogs'
                  enabled: true
                }
              ]
              metrics: [
                {
                  category: 'AllMetrics'
                  enabled: true
                }
              ]
            }
          }
    prohibitions:
      - "Never deploy Front Door without a WAF policy association"
      - "Never use Standard SKU when private link origins are required — use Premium"
      - "Never allow HTTP-only origins — enforce HTTPS for all origin connections"
      - "Never skip health probes on origin groups"
      - "Never use wildcard domains without explicit WAF rules"

  - id: AZ-AFD-002
    severity: required
    description: "Enforce HTTPS-only with TLS 1.2 minimum and redirect HTTP to HTTPS"
    rationale: "HTTP traffic is unencrypted and subject to interception"
    applies_to: [terraform-agent, bicep-agent, cloud-architect]

  - id: AZ-AFD-003
    severity: required
    description: "Use private link origins for backend connectivity (Premium SKU)"
    rationale: "Private link origins eliminate public exposure of backend services"
    applies_to: [terraform-agent, bicep-agent, cloud-architect]

  - id: AZ-AFD-004
    severity: recommended
    description: "Configure caching rules with appropriate TTLs per content type"
    rationale: "Proper caching reduces origin load, improves latency, and lowers costs"
    applies_to: [terraform-agent, bicep-agent, cloud-architect]

patterns:
  - name: "Front Door Premium with WAF and private link"
    description: "Global load balancer with WAF protection, private link origins, and HTTPS enforcement"

anti_patterns:
  - description: "Do not deploy Front Door without WAF policy"
    instead: "Always associate a WAF policy with all Front Door endpoints"
  - description: "Do not use HTTP for origin connections"
    instead: "Set originHostHeader and enforce HTTPS with TLS 1.2 minimum for all origins"

references:
  - title: "Azure Front Door documentation"
    url: "https://learn.microsoft.com/azure/frontdoor/front-door-overview"
  - title: "Front Door WAF policy"
    url: "https://learn.microsoft.com/azure/web-application-firewall/afds/afds-overview"
